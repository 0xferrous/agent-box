name: CI

on:
  push:
    branches: [main]
    paths:
      - '**/*.rs'
      - '**/Cargo.toml'
      - '**/Cargo.lock'
      - '**/.github/workflows/*.yml'
      - 'flake.nix'
      - '.cargo/config.toml'
  pull_request:
    paths:
      - '**/*.rs'
      - '**/Cargo.toml'
      - '**/Cargo.lock'
      - '**/.github/workflows/*.yml'
      - 'flake.nix'
      - '.cargo/config.toml'
  merge_group:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  CARGO_INCREMENTAL: 0
  CARGO_NET_RETRY: 10
  RUST_BACKTRACE: short
  RUSTUP_MAX_RETRIES: 10
  CACHIX_NAME: 0xferrous

jobs:
  # Fast checks that don't need compilation
  fmt:
    name: Formatting
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@stable
        with:
          components: rustfmt
      - name: Check formatting
        run: cargo fmt --all -- --check

  # Compilation and clippy checks
  check:
    name: Check & Clippy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable
        with:
          components: clippy

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          shared-key: "check-clippy"

      - name: Cargo check
        run: cargo check --all-targets --all-features

      - name: Clippy
        run: cargo clippy --all-targets --all-features -- -D warnings

  # Tests
  test:
    name: Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          shared-key: "test"

      - name: Run tests
        run: cargo test --all-features --workspace

  # Build check
  build:
    name: Build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@stable

      - uses: Swatinem/rust-cache@v2
        with:
          cache-on-failure: true
          shared-key: "build"

      - name: Build
        run: cargo build --release

  # Nix build and Cachix push
  nix-build:
    name: Nix build & Cachix
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: cachix/install-nix-action@v31

      - name: Build flake outputs
        run: |
          nix build --accept-flake-config --print-out-paths .# .#wrappers .#portal | tee /tmp/nix-build-paths

      - name: Push to Cachix
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        env:
          CACHIX_AUTH_TOKEN: ${{ secrets.CACHIX_AUTH_TOKEN }}
        run: |
          while IFS= read -r path; do
            nix run nixpkgs#cachix -- push "$CACHIX_NAME" "$path"
          done < /tmp/nix-build-paths

  # All checks passed
  ci-success:
    name: CI Success
    needs: [fmt, check, test, build, nix-build]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Check results
        run: |
          if [[ "${{ needs.fmt.result }}" != "success" ]] || \
             [[ "${{ needs.check.result }}" != "success" ]] || \
             [[ "${{ needs.test.result }}" != "success" ]] || \
             [[ "${{ needs.build.result }}" != "success" ]] || \
             [[ "${{ needs.nix-build.result }}" != "success" ]]; then
            echo "CI failed"
            exit 1
          fi
          echo "CI succeeded"
